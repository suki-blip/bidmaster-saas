<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidMaster — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f6fb;color:#0f1523;min-height:100vh}
.top{background:#0f1523;color:#fff;padding:16px 32px;display:flex;justify-content:space-between;align-items:center}
.top h1{font-size:20px;font-weight:700}
.top .badge-admin{background:#7c3aed;color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.container{max-width:1200px;margin:32px auto;padding:0 32px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #e5e7eb}
.stat.blue{border-left-color:#2563eb}
.stat.green{border-left-color:#059669}
.stat.purple{border-left-color:#7c3aed}
.stat.orange{border-left-color:#d97706}
.stat .num{font-size:32px;font-weight:800}
.stat .lbl{font-size:13px;color:#6b7280;margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:24px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-head h2{font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:#9ca3af;padding:8px 10px;border-bottom:1px solid #f3f4f6;text-transform:uppercase}
td{padding:10px;border-bottom:1px solid #f9fafb;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#ecfdf5;color:#059669}
.badge-yellow{background:#fffbeb;color:#d97706}
.badge-blue{background:#eff6ff;color:#2563eb}
.badge-purple{background:#f5f3ff;color:#7c3aed}
.badge-gray{background:#f3f4f6;color:#6b7280}
.badge-red{background:#fef2f2;color:#dc2626}
.winner-row{background:#ecfdf5!important}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-green{background:#059669;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-purple{background:#7c3aed;color:#fff}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.empty{text-align:center;padding:32px;color:#9ca3af;font-size:13px}
.section-title{font-size:18px;font-weight:800;margin-bottom:16px;color:#0f1523}
.bids-panel{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden}
.bids-panel-head{padding:14px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.bids-panel-head:hover{background:#f3f4f6}
.bids-panel-body{padding:14px;display:none}
.bids-panel-body.open{display:block}
.bid-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid #e5e7eb}
.bid-item.selected{background:#ecfdf5;border-color:#a7f3d0}
.refresh-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px}
.refresh-btn:hover{color:#374151}
</style>
</head>
<body>

<div class="top">
  <h1>🏗️ BidMaster</h1>
  <span class="badge-admin">ADMIN</span>
</div>

<div class="container">
  <div class="stat-grid">
    <div class="stat blue"><div class="num" id="sProj">—</div><div class="lbl">Projects</div></div>
    <div class="stat green"><div class="num" id="sVend">—</div><div class="lbl">Vendors</div></div>
    <div class="stat purple"><div class="num" id="sBids">—</div><div class="lbl">Total Bids</div></div>
    <div class="stat orange"><div class="num" id="sOpen">—</div><div class="lbl">Open Requests</div></div>
  </div>

  <div class="grid2" style="margin-bottom:24px">
    <div class="card">
      <div class="card-head"><h2>Projects</h2><button class="refresh-btn" onclick="loadAll()">↻</button></div>
      <table>
        <thead><tr><th>Name</th><th>Status</th><th>Created</th></tr></thead>
        <tbody id="projTable"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-head"><h2>Vendors</h2><button class="refresh-btn" onclick="loadAll()">↻</button></div>
      <table>
        <thead><tr><th>Name</th><th>Trade</th><th>Bids</th></tr></thead>
        <tbody id="vendTable"><tr><td colspan="3" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="section-title">Bid Requests & Selections</div>
  <div id="bidRequestsList"><div class="empty">Loading...</div></div>
</div>

<script>
const API = 'https://bidmaster-saas.vercel.app/api';
let projects = [], vendors = [], bidRequests = [];

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

async function loadStats() {
  const s = await api('/dashboard/stats');
  document.getElementById('sProj').textContent = s.projects ?? 0;
  document.getElementById('sVend').textContent = s.vendors ?? 0;
  document.getElementById('sBids').textContent = s.bids ?? 0;
  const brs = await api('/bid-requests');
  const open = Array.isArray(brs) ? brs.filter(b => b.status === 'open').length : 0;
  document.getElementById('sOpen').textContent = open;
}

async function loadProjects() {
  projects = await api('/projects') || [];
  const tb = document.getElementById('projTable');
  if (!projects.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">No projects</td></tr>'; return; }
  tb.innerHTML = projects.map(p => `
    <tr>
      <td><b>${p.name}</b><br><span style="color:#9ca3af;font-size:11px">${p.address||''}</span></td>
      <td><span class="badge badge-${p.status==='active'?'green':'gray'}">${p.status||'active'}</span></td>
      <td style="color:#9ca3af">${new Date(p.created_at).toLocaleDateString()}</td>
    </tr>`).join('');
}

async function loadVendors() {
  vendors = await api('/vendors') || [];
  const tb = document.getElementById('vendTable');
  if (!vendors.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">No vendors</td></tr>'; return; }
  tb.innerHTML = vendors.map(v => `
    <tr>
      <td><b>${v.name}</b><br><span style="color:#9ca3af;font-size:11px">${v.email}</span></td>
      <td><span class="badge badge-blue">${v.trade||'General'}</span></td>
      <td><span class="badge badge-gray">${v.bid_count||0}</span></td>
    </tr>`).join('');
}

async function loadBidRequests() {
  bidRequests = await api('/bid-requests') || [];
  const el = document.getElementById('bidRequestsList');
  if (!bidRequests.length) { el.innerHTML = '<div class="empty">No bid requests yet</div>'; return; }
  el.innerHTML = bidRequests.map((br, i) => {
    const proj = projects.find(p => p.id === br.project_id);
    const bids = br.bids || [];
    const winner = bids.find(b => b.status === 'selected');
    const lowest = bids.length ? bids.reduce((a,b) => +a.amount < +b.amount ? a : b) : null;
    return `
    <div class="bids-panel">
      <div class="bids-panel-head" onclick="togglePanel('panel-${i}')">
        <div>
          <b>${br.trade}</b>
          <span style="color:#6b7280;margin-left:8px;font-size:13px">${proj?.name||'Unknown Project'}</span>
          ${winner ? '<span class="badge badge-green" style="margin-left:8px">✓ Winner Selected</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="badge badge-${br.status==='open'?'blue':'gray'}">${br.status}</span>
          <span style="color:#9ca3af;font-size:13px">${bids.length} bid${bids.length!==1?'s':''}</span>
          <span>▾</span>
        </div>
      </div>
      <div class="bids-panel-body" id="panel-${i}">
        ${br.due_date ? `<div style="font-size:12px;color:#9ca3af;margin-bottom:12px">Due: ${br.due_date}</div>` : ''}
        ${br.description ? `<div style="font-size:13px;color:#374151;margin-bottom:12px">${br.description}</div>` : ''}
        ${!bids.length ? '<div class="empty">No bids received yet</div>' : bids.map(b => {
          const vend = vendors.find(v => v.id === b.vendor_id);
          const isWinner = b.status === 'selected';
          const isLowest = lowest && b.id === lowest.id;
          return `
          <div class="bid-item ${isWinner?'selected':''}">
            <div>
              <b>${vend?.name||'Unknown Vendor'}</b>
              ${isLowest && !isWinner ? '<span class="badge badge-yellow" style="margin-left:6px">Lowest</span>' : ''}
              ${isWinner ? '<span class="badge badge-green" style="margin-left:6px">✓ Selected</span>' : ''}
              <div style="font-size:12px;color:#6b7280;margin-top:2px">${vend?.trade||''} · ${b.notes||'No notes'}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px;font-weight:800;color:${isWinner?'#059669':'#0f1523'}">$${Number(b.amount).toLocaleString()}</div>
              ${!isWinner && br.status==='open' ? `<button class="btn btn-green" style="margin-top:4px" onclick="selectWinner('${br.id}','${b.id}')">Select Winner</button>` : ''}
            </div>
          </div>`;
        }).join('')}
        ${br.status === 'open' && bids.length > 0 ? `<div style="margin-top:10px"><button class="btn btn-outline" onclick="closeRequest('${br.id}')">Close Request</button></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function togglePanel(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

async function selectWinner(bidRequestId, bidId) {
  if (!confirm('Select this vendor as the winner?')) return;
  const r = await api('/bids/select-winner', 'POST', { bid_request_id: bidRequestId, bid_id: bidId });
  if (r.success || r.id) loadAll();
  else alert('Error: ' + JSON.stringify(r));
}

async function closeRequest(bidRequestId) {
  if (!confirm('Close this bid request?')) return;
  alert('Close functionality coming soon');
}

async function loadAll() {
  await Promise.all([loadStats(), loadProjects(), loadVendors()]);
  loadBidRequests();
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
